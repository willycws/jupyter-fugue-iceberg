x-airflow-common:
  &airflow-common
  build: .
  image: airflow-custom:2.10.5
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    _PIP_ADDITIONAL_REQUIREMENTS: ''
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
    AWS_REGION: us-east-1
    AIRFLOW_CONN_SPARK_DEFAULT: 'spark://spark-master:7077?deploy-mode=client'
  volumes:
    - ./src:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - ./spark/apps:/opt/airflow/spark/apps
    - spark-event-logs:/tmp/spark-events
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:
  # ───────────────────────────────────────────────
  # Airflow services
  # ───────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  redis:
    image: redis:7
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" --timeout=10'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /sources/logs /sources/dags /sources/plugins
        chown -R "${AIRFLOW_UID:-50000}:0" /sources/{logs,dags,plugins}
        exec /entrypoint airflow version
    environment:
      <<: *airflow-common-env
      _PIP_ADDITIONAL_REQUIREMENTS: ''
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"
    volumes:
      - .:/sources

  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    environment:
      <<: *airflow-common-env
      CONNECTION_CHECK_MAX_COUNT: "0"
    command:
      - bash
      - -c
      - airflow

  # ───────────────────────────────────────────────
  # Spark services
  # ───────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.6-python3
    environment:
      SPARK_NO_DAEMONIZE: 'true'
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    command: /opt/spark/sbin/start-master.sh
    ports:
      - "9090:8080"
      - "7077:7077"
    volumes:
      - ./spark/apps:/opt/spark-apps
      - spark-iceberg-warehouse:/home/iceberg/warehouse
    restart: always

  spark-worker:
    image: apache/spark:3.5.6-python3
    environment:
      SPARK_NO_DAEMONIZE: 'true'
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    command: /opt/spark/sbin/start-worker.sh spark://spark-master:7077
    volumes:
      - ./spark/apps:/opt/spark-apps
      - spark-iceberg-warehouse:/home/iceberg/warehouse
    depends_on:
      - spark-master
    restart: always

  # ───────────────────────────────────────────────
  # MinIO (S3-compatible storage for Iceberg)
  # ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  mc-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/iceberg-warehouse
        mc mb --ignore-existing local/spark-event-logs
        echo "MinIO buckets ready: iceberg-warehouse, spark-event-logs"

  # ───────────────────────────────────────────────
  # Iceberg REST Catalog
  # ───────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:latest
    environment:
      CATALOG_WAREHOUSE: s3://iceberg-warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: 'true'
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
    ports:
      - "8181:8181"
    depends_on:
      minio:
        condition: service_healthy
      mc-init:
        condition: service_completed_successfully
    restart: always

  # ───────────────────────────────────────────────
  # Jupyter Notebook (with Fugue + DataFusion + PyIceberg)
  # ───────────────────────────────────────────────
  jupyter-notebook:
    build: ./jupyter
    image: jupyter-fugue:latest
    environment:
      JUPYTER_ENABLE_LAB: 'yes'
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      ICEBERG_REST_URI: http://iceberg-rest:8181
      S3_ENDPOINT: http://minio:9000
      JAVA_HOME: /usr/lib/jvm/default-java
      RAY_OBJECT_STORE_MEMORY: '200000000'
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      minio:
        condition: service_healthy
      iceberg-rest:
        condition: service_started
    shm_size: 2g
    deploy:
      resources:
        limits:
          memory: 6g
    restart: always
    command: start-notebook.py --NotebookApp.token='' --NotebookApp.password=''

  # ───────────────────────────────────────────────
  # Spark History Server
  # ───────────────────────────────────────────────
  spark-history-server:
    image: apache/spark:3.5.6-python3
    user: "0:0"
    environment:
      SPARK_NO_DAEMONIZE: 'true'
      SPARK_HISTORY_OPTS: >-
        -Dspark.history.fs.logDirectory=/tmp/spark-events
    command: /opt/spark/sbin/start-history-server.sh
    ports:
      - "18080:18080"
    volumes:
      - spark-event-logs:/tmp/spark-events
    restart: always

volumes:
  postgres-db-volume:
  minio-data:
  spark-iceberg-warehouse:
  spark-event-logs:
